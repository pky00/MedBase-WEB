<div class="form-field">
  @if (label()) {
    <label class="form-label">
      {{ label() }}
      @if (required()) {
        <span class="required">*</span>
      }
    </label>
  }

  <div class="dropdown" [class.dropdown-open]="isOpen()" [class.dropdown-disabled]="isDisabled()">
    <button
      type="button"
      class="dropdown-trigger"
      [class.dropdown-error]="errorMessage()"
      (click)="toggle()"
      [disabled]="isDisabled()"
    >
      <span class="dropdown-value" [class.dropdown-placeholder]="!selectedLabel()">
        {{ selectedLabel() || placeholder() }}
      </span>
      <span class="dropdown-actions">
        @if (selectedLabel()) {
          <span class="dropdown-clear" (click)="clear($event)">×</span>
        }
        <span class="dropdown-arrow">▾</span>
      </span>
    </button>

    @if (isOpen()) {
      <div class="dropdown-menu">
        <div class="dropdown-search">
          <input
            type="text"
            class="dropdown-search-input"
            placeholder="Search (min 3 chars)..."
            [value]="searchText()"
            (input)="onSearch($event)"
          />
        </div>
        <div class="dropdown-options">
          @for (option of options(); track option.value) {
            <button
              type="button"
              class="dropdown-option"
              [class.dropdown-option-selected]="option.value === selectedLabel()"
              (click)="select(option)"
            >
              {{ option.label }}
            </button>
          }
          @if (options().length === 0 && !loading()) {
            <div class="dropdown-empty">No options found</div>
          }
          @if (loading()) {
            <div class="dropdown-loading">Loading...</div>
          }
          @if (hasMore() && !loading()) {
            <button type="button" class="dropdown-load-more" (click)="onLoadMore()">
              View More...
            </button>
          }
        </div>
      </div>
    }
  </div>

  @if (errorMessage()) {
    <span class="form-error">{{ errorMessage() }}</span>
  }
</div>
