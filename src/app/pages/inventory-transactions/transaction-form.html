<div class="page-header">
  <div>
    <h1 class="page-title">Create Transaction</h1>
    <p class="page-subtitle">Record a new inventory transaction</p>
  </div>
</div>

<div class="form-card">
  @if (errorMessage()) {
    <div class="alert-error">
      {{ errorMessage() }}
    </div>
  }

  <form (ngSubmit)="onSubmit()">
    <div class="form-section">
      <h3 class="form-section-title">Transaction Details</h3>
      <div class="form-grid">
        <div class="form-field">
          <label class="form-label" for="transaction_type">Transaction Type <span class="required">*</span></label>
          <select id="transaction_type" class="form-select" [value]="transactionType" (change)="onTransactionTypeChange($event)">
            <option value="">— Select Type —</option>
            <option value="purchase">Purchase</option>
            <option value="donation">Donation</option>
            <option value="prescription">Prescription</option>
            <option value="loss">Loss</option>
            <option value="breakage">Breakage</option>
            <option value="expiration">Expiration</option>
            <option value="destruction">Destruction</option>
          </select>
        </div>

        <app-input
          label="Transaction Date"
          type="date"
          placeholder="Select date"
          inputId="transaction_date"
          [required]="true"
          [(ngModel)]="transactionDate"
          name="transactionDate"
        />

        @if (needsThirdParty) {
          <app-dropdown
            [label]="thirdPartyLabel"
            [placeholder]="'Search and select ' + thirdPartyLabel.toLowerCase()"
            [options]="thirdPartyOptions()"
            [hasMore]="thirdPartyHasMore()"
            [required]="true"
            (loadMore)="onThirdPartyLoadMore()"
            (searchChanged)="onThirdPartySearch($event)"
            [(ngModel)]="thirdPartyId"
            name="thirdPartyId"
          />
        }

        <app-input
          label="Notes"
          type="textarea"
          placeholder="Enter notes (optional)"
          inputId="notes"
          [(ngModel)]="notes"
          name="notes"
        />
      </div>
    </div>

    <div class="form-section">
      <div class="section-header">
        <h3 class="form-section-title">Items <span class="required">*</span></h3>
        <app-button variant="secondary" type="button" (clicked)="addItem()">+ Add Item</app-button>
      </div>

      @for (item of items; track $index; let i = $index) {
        <div class="item-row">
          <div class="item-fields">
            <div class="form-field">
              <label class="form-label">Item Type</label>
              <select class="form-select" [value]="item.item_type" (change)="onItemTypeChange(i, $event)">
                <option value="">— Select —</option>
                <option value="medicine">Medicine</option>
                <option value="equipment">Equipment</option>
                <option value="medical_device">Medical Device</option>
              </select>
            </div>

            <app-dropdown
              label="Item"
              placeholder="Search and select item"
              [options]="item.itemOptions"
              [hasMore]="item.itemHasMore"
              (loadMore)="onItemLoadMore(i)"
              (searchChanged)="onItemSearch(i, $event)"
              [(ngModel)]="item.item_id"
              [name]="'item_id_' + i"
              [disabled]="!item.item_type"
            />

            <app-input
              label="Quantity"
              type="number"
              placeholder="Enter quantity"
              [inputId]="'quantity_' + i"
              [(ngModel)]="item.quantity"
              [name]="'quantity_' + i"
            />
          </div>

          @if (items.length > 1) {
            <button type="button" class="remove-item-btn" (click)="removeItem(i)" title="Remove item">
              &times;
            </button>
          }
        </div>
      }
    </div>

    <div class="form-actions">
      <app-button variant="secondary" (clicked)="cancel()">Cancel</app-button>
      <app-button type="submit" variant="primary" [loading]="saving()">Create Transaction</app-button>
    </div>
  </form>
</div>
