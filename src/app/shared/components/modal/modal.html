@if (isOpen()) {
  <div class="modal-backdrop" (click)="onBackdropClick($event)">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">{{ title() }}</h2>
        <button class="modal-close" (click)="onClose()">×</button>
      </div>
      <div class="modal-body">
        <ng-content />
      </div>
    </div>
  </div>
}
