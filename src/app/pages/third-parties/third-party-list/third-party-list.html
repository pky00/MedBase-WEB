<div class="page-header">
  <div>
    <h1 class="page-title">Third Parties</h1>
    <p class="page-subtitle">View all third party records (auto-created from users, doctors, patients, partners)</p>
  </div>
</div>

<div class="filters-bar">
  <select class="filter-select" (change)="table.onFilterChange(filterType, $event); loadThirdParties()">
    <option value="">All Types</option>
    <option value="user">User</option>
    <option value="doctor">Doctor</option>
    <option value="patient">Patient</option>
    <option value="partner">Partner</option>
  </select>
  <select class="filter-select" (change)="table.onFilterChange(filterActive, $event); loadThirdParties()">
    <option value="">All Status</option>
    <option value="true">Active</option>
    <option value="false">Inactive</option>
  </select>
</div>

<app-data-table
  [columns]="columns"
  [data]="thirdParties()"
  [actions]="[]"
  [loading]="table.loading()"
  [totalItems]="table.totalItems()"
  [currentPage]="table.currentPage()"
  [pageSize]="table.pageSize"
  [sortColumn]="table.sortColumn()"
  [sortOrder]="table.sortOrder()"
  (sorted)="table.onSort($event); loadThirdParties()"
  (pageChanged)="table.onPageChange($event); loadThirdParties()"
/>
