<div class="page-header">
  <div>
    <h1 class="page-title">Inventory Transactions</h1>
    <p class="page-subtitle">Track inventory movements and changes</p>
  </div>
  <app-button variant="primary" (clicked)="createTransaction()">+ New Transaction</app-button>
</div>

<div class="filters-bar">
  <select class="filter-select" (change)="table.onFilterChange(filterTransactionType, $event); loadTransactions()">
    <option value="">All Types</option>
    <option value="purchase">Purchase</option>
    <option value="donation">Donation</option>
    <option value="prescription">Prescription</option>
    <option value="loss">Loss</option>
    <option value="breakage">Breakage</option>
    <option value="expiration">Expiration</option>
    <option value="destruction">Destruction</option>
  </select>
</div>

<app-data-table
  [columns]="columns"
  [data]="transactions()"
  [actions]="actions"
  [loading]="table.loading()"
  [totalItems]="table.totalItems()"
  [currentPage]="table.currentPage()"
  [pageSize]="table.pageSize"
  [sortColumn]="table.sortColumn()"
  [sortOrder]="table.sortOrder()"
  (sorted)="table.onSort($event); loadTransactions()"
  (pageChanged)="table.onPageChange($event); loadTransactions()"
  (actionClicked)="onAction($event)"
/>

<app-modal
  title="Delete Transaction"
  [isOpen]="deleteModalOpen()"
  (closed)="cancelDelete()"
>
  <p>Are you sure you want to delete this transaction?</p>
  <p class="modal-warning">This will reverse inventory changes and cannot be undone.</p>
  <div class="modal-actions">
    <app-button variant="secondary" (clicked)="cancelDelete()">Cancel</app-button>
    <app-button variant="danger" [loading]="deleting()" (clicked)="confirmDelete()">Delete</app-button>
  </div>
</app-modal>
